# Deploy Docusaurus site to GitHub Pages
# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: Deploy Docusaurus to GitHub Pages

on:
    push:
        branches:
            - main
        paths:
            - ".github/workflows/deploy-docusaurus.yml"
            - "docs/docusaurus/**"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        name: Build docs site
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: docs/docusaurus

        steps:
            - name: Harden runner
              uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0 # Need full history for proper git info

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .node-version
                  cache: npm
                  cache-dependency-path: docs/docusaurus/package-lock.json

            - name: Upgrade npm
              run: npm install -g npm@11

            - name: Install dependencies
              run: npm ci --force

            - name: Build Docusaurus site
              run: npm run build

            - name: Setup GitHub Pages
              uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

            - name: Upload pages artifact
              uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
              with:
                  path: docs/docusaurus/build

    deploy:
        name: Deploy site
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Harden runner
              uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
              with:
                  egress-policy: audit

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
